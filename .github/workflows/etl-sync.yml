name: Muscat ETL Sync (Hourly)

on:
  schedule:
    - cron: '0 6-22 * * *'  # Every hour 6:00-22:00 UTC (business hours)
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Include raw tables (customers, events, sales)?'
        required: false
        default: 'false'
        type: boolean

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Write OpenVPN config
        run: echo "${{ secrets.OVPN_CONFIG }}" | base64 -d > /tmp/muscat.ovpn

      - name: Connect to VPN
        run: |
          sudo openvpn --config /tmp/muscat.ovpn --daemon --log /tmp/openvpn.log
          echo "Waiting for VPN connection..."
          for i in $(seq 1 30); do
            if ip addr show tun0 2>/dev/null | grep -q "inet "; then
              echo "VPN connected!"
              break
            fi
            sleep 2
          done
          ping -c 1 -W 5 10.0.216.28 || (cat /tmp/openvpn.log && exit 1)

      - name: Run ETL (aggregates only for hourly, full on manual)
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          if [ "${{ inputs.full_sync }}" = "true" ]; then
            echo "Running FULL sync (with raw tables)..."
            python3 -u etl/muscat_etl.py
          else
            echo "Running FAST sync (aggregates only)..."
            python3 -u etl/muscat_etl.py --skip-raw
          fi

      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn 2>/dev/null || true
